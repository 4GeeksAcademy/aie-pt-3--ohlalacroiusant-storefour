<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ohlala Croisant Storefour | Home</title>
  <meta name="description" content="Pasteleria artesanal de lujo con croissants unicos y una experiencia elegante." />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="components/layout-components.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #fdf5e8;
      --gold: #c08a43;
      --wine: #7c1f30;
      --ink: #18140f;
      --paper: #fffaf0;
      --leaf: #4e6f3d;
    }

    body {
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(192, 138, 67, 0.14), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(124, 31, 48, 0.12), transparent 45%),
        linear-gradient(160deg, #fffaf0 0%, #fef6e6 55%, #fff3dd 100%);
      min-height: 100vh;
    }

    h1, h2, h3 {
      font-family: "Cormorant Garamond", serif;
      letter-spacing: 0.01em;
    }

    .hero-fade {
      animation: hero-fade 0.85s ease-out both;
    }

    .card-rise {
      animation: card-rise 0.75s ease-out both;
    }

    .card-rise:nth-child(2) {
      animation-delay: 0.12s;
    }

    .card-rise:nth-child(3) {
      animation-delay: 0.24s;
    }

    @keyframes hero-fade {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes card-rise {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Ohlala Croisant Storefour",
    "url": "https://ohlalacroisant.example",
    "logo": "https://ohlalacroisant.example/logo-croisant-txapela.svg",
    "sameAs": [
      "https://www.instagram.com/ohlalacroisant",
      "https://www.facebook.com/ohlalacroisant"
    ]
  }
  </script>
</head>
<body class="overflow-x-hidden">
  <site-navbar></site-navbar>

  <main>
  </main>

  <site-footer></site-footer>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Ohlala Croisant Storefour",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "14 Rue de la Lune",
      "addressLocality": "Paris",
      "postalCode": "75002",
      "addressCountry": "FR"
    },
    "telephone": "+33-1-00-00-00-00",
    "servesCuisine": "French Bakery"
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://ohlalacroisant.example/"
      }
    ]
  }
  </script>
</body>
</html>
