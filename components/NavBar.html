<header class="sticky top-0 z-40 border-b border-amber-900/10 bg-[color:var(--paper)]/90 backdrop-blur-md">

    <a href="index.html" class="group flex items-center gap-3" aria-label="Ir al inicio">
      <figure class="relative h-14 w-14 overflow-hidden rounded-full border border-amber-900/15 bg-amber-50 shadow-sm">
        <svg viewBox="0 0 96 96" role="img" aria-label="Croisant con txapela y camiseta blanca de lunas rojas" class="h-full w-full">
          <defs>
            <linearGradient id="croisantBase" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f4bf67"></stop>
              <stop offset="100%" stop-color="#d78b3f"></stop>
            </linearGradient>
          </defs>
          <rect width="96" height="96" fill="#fdf7ec"></rect>
          <ellipse cx="48" cy="88" rx="24" ry="5" fill="#d8b78a" opacity="0.3"></ellipse>
          <path d="M22 44c4-13 16-21 27-21s23 8 27 21c-3 2-6 2-9 1-2-7-9-12-18-12s-16 5-18 12c-3 1-6 1-9-1z" fill="url(#croisantBase)"></path>
          <path d="M24 46c2 8 10 14 25 14s23-6 25-14c-1-1-4-2-7-2-3 6-10 10-18 10s-15-4-18-10c-3 0-6 1-7 2z" fill="#b56f2f"></path>

          <circle cx="41" cy="64" r="2.3" fill="#bc1733"></circle>
          <circle cx="49" cy="67" r="2.3" fill="#bc1733"></circle>
          <circle cx="56" cy="63" r="2.3" fill="#bc1733"></circle>
          <circle cx="45" cy="73" r="2.3" fill="#bc1733"></circle>
          <circle cx="54" cy="74" r="2.3" fill="#bc1733"></circle>
        </svg>
        <figcaption class="sr-only">Logo oficial de Ohlala Croisant</figcaption>
      </figure>
      <div>
        <p class="text-2xl font-semibold leading-none tracking-tight text-[color:var(--wine)]">Ohlala</p>
        <p class="text-xs uppercase tracking-[0.26em] text-amber-900/70">Croisant Storefour</p>
      </div>
    </a>

    <ul class="hidden items-center gap-8 text-sm font-medium text-amber-950 md:flex">
      <li><a class="transition hover:text-[color:var(--wine)]" href="index.html">Home</a></li>
      <li><a class="transition hover:text-[color:var(--wine)]" href="catalogo.html">Catalogo</a></li>
      <li><a class="transition hover:text-[color:var(--wine)]" href="index.html#collection">Coleccion</a></li>
      <li><a class="transition hover:text-[color:var(--wine)]" href="contact.html">Contacto</a></li>
    </ul>

    <div class="flex items-center gap-2 sm:gap-3">
      <form class="hidden items-center rounded-full border border-amber-900/15 bg-white pr-1 focus-within:border-[color:var(--wine)] sm:flex" action="#" method="get">
        <label for="search" class="sr-only">Buscar</label>
        <input id="search" type="search" placeholder="Buscar..." class="w-full bg-transparent px-4 py-2 text-sm outline-none ring-0 placeholder:text-amber-900/45" />
        <button type="submit" class="rounded-full bg-white p-1.5 text-amber-950 shadow-sm transition hover:text-[color:var(--wine)]" aria-label="Realizar busqueda">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
            <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd" />
          </svg>
        </button>
      </form>
      <a href="carrito.html" class="rounded-full bg-[color:var(--wine)] px-3 py-2 text-xs font-semibold uppercase tracking-widest text-white shadow-sm transition hover:bg-[#631727] sm:text-sm" aria-label="Ir al carrito completo">
        Carrito (<span data-cart-count>0</span>)
      </a>

      <div x-data="{ open: false }" class="relative">
        <button id="user-menu-button" @click="open = !open" class="rounded-full p-2 text-amber-950 transition hover:text-[color:var(--wine)] hover:bg-amber-100/50" aria-label="Abrir menu de usuario" aria-haspopup="true" :aria-expanded="open">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-7 w-7">
            <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-5.5-2.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0ZM10 12a5.99 5.99 0 0 0-4.793 2.39A6.483 6.483 0 0 0 10 16.5a6.483 6.483 0 0 0 4.793-2.11A5.99 5.99 0 0 0 10 12Z" clip-rule="evenodd" />
          </svg>
        </button>
        <div x-show="open" @click.outside="open = false" x-transition:enter="transition ease-out duration-100" x-transition:enter-start="transform opacity-0 scale-95" x-transition:enter-end="transform opacity-100 scale-100" x-transition:leave="transition ease-in duration-75" x-transition:leave-start="transform opacity-100 scale-100" x-transition:leave-end="transform opacity-0 scale-95" class="absolute right-0 mt-2 w-48 origin-top-right rounded-md bg-white py-1 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none" role="menu" aria-orientation="vertical" aria-labelledby="user-menu-button" style="display: none;">
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem">Cuenta</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem">Pedidos</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem">Perfil</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem">Ajustes</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem">Cerrar sesion</a>
        </div>
      </div>
    </div>
  </nav>
</header>
